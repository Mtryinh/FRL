<style>
:root {
  --bg:#08090a; --surf:#0f1112; --surf2:#161819; --surf3:#1d2022;

}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:13px;min-height:100vh;}

#pinOverlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
#pinOverlay.hidden{display:none;}
.pin-box{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:32px 40px;text-align:center;max-width:320px;width:90%;}
.pin-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--acc);margin-bottom:6px;}
.pin-sub{font-size:11px;color:var(--dim);margin-bottom:20px;}
.pin-input{background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:22px;text-align:center;letter-spacing:8px;padding:10px 16px;border-radius:6px;outline:none;width:100%;margin-bottom:10px;}
.pin-input:focus{border-color:var(--acc);}
.pin-btn{background:var(--acc);color:#08090a;border:none;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;padding:10px 24px;border-radius:6px;cursor:pointer;width:100%;}
.pin-btn:hover{background:#f5d96a;}
.pin-err{color:var(--red);font-size:11px;min-height:16px;}

#syncStatus{position:fixed;bottom:16px;left:16px;font-size:10px;color:var(--mute);letter-spacing:.5px;z-index:100;transition:color .3s;}
#syncStatus.syncing{color:var(--amb);}
#syncStatus.ok{color:var(--grn);}
#syncStatus.err{color:var(--red);}

header{position:sticky;top:0;z-index:100;height:54px;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:12px;}
.logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--acc);letter-spacing:.5px;white-space:nowrap;}
.logo em{color:var(--dim);font-style:normal;font-size:11px;font-family:'IBM Plex Mono',monospace;margin-left:8px;letter-spacing:1px;text-transform:uppercase;}
.badge{background:var(--surf3);border:1px solid var(--bdr2);border-radius:3px;padding:3px 9px;font-size:10px;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;}
.nav-link{background:var(--surf2);border:1px solid var(--bdr2);color:var(--acc2);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 11px;border-radius:4px;text-decoration:none;transition:all .12s;white-space:nowrap;}
.nav-link:hover{border-color:var(--acc);color:var(--acc);}
.hdr-right{display:flex;gap:6px;margin-left:auto;align-items:center;}
.btn{background:var(--surf2);border:1px solid var(--bdr2);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 11px;border-radius:4px;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.btn.pri{background:var(--acc);color:#08090a;border-color:var(--acc);font-weight:500;}
.btn.pri:hover{background:#f5d96a;}

.week-nav{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.week-nav button{background:var(--surf2);border:1px solid var(--bdr2);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .12s;}

main{padding:16px 20px;max-width:1600px;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px;margin-bottom:16px;}

.day-card.today{border-color:var(--acc2);}

.day-body{padding:10px 12px;}
.day-total{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:4px;}
.day-vs{font-size:10px;margin-bottom:8px;}

.field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:6px;}

.staff-inp:focus{border-color:var(--acc);}

.day-notes{width:100%;background:var(--surf2);border:1px solid var(--bdr);color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 7px;border-radius:3px;resize:none;outline:none;margin-top:6px;min-height:38px;transition:border-color .12s;}
.day-notes:focus{border-color:var(--acc);color:var(--txt);}

.tw{overflow-x:auto;border:1px solid var(--bdr);border-radius:6px;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--surf2);padding:8px 11px;text-align:right;font-size:9px;letter-spacing:.9px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--bdr);white-space:nowrap;}
thead th:first-child{text-align:left;min-width:120px;}

tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.012);}
td{padding:7px 11px;text-align:right;font-size:12px;}
td:first-child{text-align:left;color:var(--dim);font-size:11px;}
tr.tot td{background:var(--surf2);font-weight:500;font-family:'Playfair Display',serif;font-size:13px;}
tr.tot td:first-child{font-family:'IBM Plex Mono',monospace;font-size:11px;}

.vp{color:var(--grn);}.vn{color:var(--red);}.vz{color:var(--mute);}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.dg{background:var(--grn);box-shadow:0 0 4px var(--grn);}
.da{background:var(--amb);box-shadow:0 0 4px var(--amb);}
.dr{background:var(--red);box-shadow:0 0 4px var(--red);}

.sec-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin:16px 0 8px;}

#toast{position:fixed;bottom:16px;right:16px;background:var(--surf2);border:1px solid var(--bdr2);border-radius:5px;padding:8px 14px;font-size:11px;color:var(--txt);transform:translateY(50px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.success{border-color:var(--acc);color:var(--acc);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}
</style>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const NUM_FIELDS  = ['wet','dry','gam','pbr','staff','hours','bud_wet','bud_dry','bud_gam','ly_wet','ly_dry','ly_gam'];
const TEXT_FIELDS = ['notes'];

// In-memory cache: D[weekKey][dayIndex][field]
let D = {};

// ── PIN ───────────────────────────────────────────────────────
function checkPin(){
  const val=document.getElementById('pinInput').value;
  if(val===String(CONFIG.pin)){
    document.getElementById('pinOverlay').classList.add('hidden');
    sessionStorage.setItem('roxy_auth','1');
    init();
  } else {
    document.getElementById('pinErr').textContent='Incorrect PIN — try again';
    document.getElementById('pinInput').value='';
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('roxy_auth')==='1'){
    document.getElementById('pinOverlay').classList.add('hidden');
    init();
  }
});

// ── Supabase helpers ──────────────────────────────────────────
const SB_HEADERS=()=>({'Content-Type':'application/json','apikey':CONFIG.supabaseKey,'Authorization':'Bearer '+CONFIG.supabaseKey});
async function sbSelect(table,params=''){const r=await fetch(`${CONFIG.supabaseUrl}/rest/v1/${table}?${params}`,{headers:SB_HEADERS()});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbUpsert(table,rows){const r=await fetch(`${CONFIG.supabaseUrl}/rest/v1/${table}`,{method:'POST',headers:{...SB_HEADERS(),'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(rows)});if(!r.ok)throw new Error(await r.text());}
async function sbDelete(table,params){const r=await fetch(`${CONFIG.supabaseUrl}/rest/v1/${table}?${params}`,{method:'DELETE',headers:SB_HEADERS()});if(!r.ok)throw new Error(await r.text());}

function setSyncStatus(state){
  const el=document.getElementById('syncStatus');
  el.className=state;el.textContent={syncing:'⬤ saving…',ok:'⬤ saved',err:'⬤ sync error'}[state]||'⬤ ready';
  if(state==='ok')setTimeout(()=>{el.textContent='⬤ ready';el.className='';},2000);
}

// ── Load/save ─────────────────────────────────────────────────
function ensWeek(key){
  if(!D[key])D[key]=Array(7).fill(null).map(()=>{
    const o={};
    NUM_FIELDS.forEach(f=>o[f]='');
    TEXT_FIELDS.forEach(f=>o[f]='');
    return o;
  });
}

async function loadWeek(key){
  setSyncStatus('syncing');
  ensWeek(key);
  try{
    const rows=await sbSelect('daily_data',`venue=eq.${CONFIG.venue}&week_key=eq.${key}`);
    rows.forEach(r=>{
      if(r.day_index<0||r.day_index>6)return;
      if(NUM_FIELDS.includes(r.field)) D[key][r.day_index][r.field]=r.value!=null?r.value:'';
      if(TEXT_FIELDS.includes(r.field)) D[key][r.day_index][r.field]=r.text_value||'';
    });
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');console.error(e);}
}

let saveTimer=null;
function schedSave(key,di,field){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveField(key,di,field),600);
}
async function saveField(key,di,field){
  setSyncStatus('syncing');
  const val=D[key]?.[di]?.[field];
  const isText=TEXT_FIELDS.includes(field);
  try{
    await sbUpsert('daily_data',[{
      venue:CONFIG.venue, week_key:key, day_index:di, field,
      value: isText?null:(val===''||val==null?null:parseFloat(val)),
      text_value: isText?(val||null):null,
    }]);
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');console.error(e);}
}

// ── Date helpers ──────────────────────────────────────────────
function weekKey(mon){return`${mon.getFullYear()}-W${String(isoWeek(mon)).padStart(2,'0')}`;}
function isoWeek(d){const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dayNum=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));return Math.ceil((((date-yearStart)/86400000)+1)/7);}
function getMondayOf(d){const date=new Date(d);const day=date.getDay();const diff=(day===0?-6:1-day);date.setDate(date.getDate()+diff);date.setHours(0,0,0,0);return date;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}

let currentMon=getMondayOf(new Date());

// ── Format ────────────────────────────────────────────────────
function f(v){if(v===0||isNaN(v))return'—';const a=Math.abs(v).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});return v<0?`(£${a})`:`£${a}`;}
function fp(v){if(!isFinite(v)||isNaN(v))return'—';const s=Math.abs(v).toFixed(1)+'%';return v>0?`+${s}`:v<0?`-${s}`:s;}
function gn(key,di,field){ensWeek(key);const v=D[key][di][field];return(v===''||v==null)?0:parseFloat(v);}

function vcol(d){if(!d||isNaN(d))return'vz';return d>0?'vp':'vn';}

// ── Navigation ────────────────────────────────────────────────
function prevWeek(){currentMon=addDays(currentMon,-7);loadAndRender();}
function nextWeek(){currentMon=addDays(currentMon,7);loadAndRender();}
function goToday(){currentMon=getMondayOf(new Date());loadAndRender();}
function jumpToDate(val){if(!val)return;const p=val.split('-');currentMon=getMondayOf(new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])));loadAndRender();}
function syncDatePicker(){const dp=document.getElementById('datePicker');if(!dp)return;const y=currentMon.getFullYear(),m=String(currentMon.getMonth()+1).padStart(2,'0'),d=String(currentMon.getDate()).padStart(2,'0');dp.value=`${y}-${m}-${d}`;}

async function loadAndRender(){
  const key=weekKey(currentMon);
  await loadWeek(key);
  render();
}

// ── Render ────────────────────────────────────────────────────
function render(){
  const key=weekKey(currentMon);
  ensWeek(key);
  const sun=addDays(currentMon,6);
  document.getElementById('weekLabel').textContent=`Week of ${fmtDate(currentMon)} – ${fmtDate(sun)}`;
  document.getElementById('weekSub').textContent=`${currentMon.getFullYear()} · ${key}`;
  syncDatePicker();

  const dayTotals=DAYS.map((_,i)=>{
    const wet=gn(key,i,'wet'),dry=gn(key,i,'dry'),gam=gn(key,i,'gam');
    return{wet,dry,gam,total:wet+dry+gam,pbr:gn(key,i,'pbr'),staff:gn(key,i,'staff'),hours:gn(key,i,'hours'),
      bud:gn(key,i,'bud_wet')+gn(key,i,'bud_dry')+gn(key,i,'bud_gam'),
      ly:gn(key,i,'ly_wet')+gn(key,i,'ly_dry')+gn(key,i,'ly_gam')};
  });

  const weekTotal=dayTotals.reduce((s,d)=>s+d.total,0);
  const weekBud=dayTotals.reduce((s,d)=>s+d.bud,0);
  const weekLY=dayTotals.reduce((s,d)=>s+d.ly,0);
  const weekPBR=dayTotals.reduce((s,d)=>s+d.pbr,0);
  const weekWet=dayTotals.reduce((s,d)=>s+d.wet,0);
  const weekDry=dayTotals.reduce((s,d)=>s+d.dry,0);
  const weekGam=dayTotals.reduce((s,d)=>s+d.gam,0);
  const weekStaff=dayTotals.reduce((s,d)=>s+d.staff,0);
  const weekHours=dayTotals.reduce((s,d)=>s+d.hours,0);
  const today=new Date();today.setHours(0,0,0,0);
  const varBud=weekTotal-weekBud,varLY=weekTotal-weekLY;
  const pbrConv=weekPBR>0?Math.min(999,(weekTotal/weekPBR)*100):0;

  document.getElementById('weekCards').innerHTML=[
    {l:'Week Revenue',v:f(weekTotal),s:weekBud?`${f(varBud)} vs budget`:'',cls:varBud>=0?'pos':'neg'},
    {l:'Budget',v:f(weekBud),s:''},
    {l:'vs Last Year',v:f(varLY),s:weekLY?fp(weekLY?(varLY/weekLY)*100:0):'',cls:varLY>=0?'pos':'neg'},
    {l:'PBR',v:f(weekPBR),s:pbrConv?`${pbrConv.toFixed(0)}% converted`:'',cls:''},
    {l:'Wet Revenue',v:f(weekWet),s:weekTotal?((weekWet/weekTotal)*100).toFixed(1)+'% of total':'',cls:''},
    {l:'Dry Revenue',v:f(weekDry),s:weekTotal?((weekDry/weekTotal)*100).toFixed(1)+'% of total':'',cls:''},
    {l:'Gaming Revenue',v:f(weekGam),s:weekTotal?((weekGam/weekTotal)*100).toFixed(1)+'% of total':'',cls:''},
    {l:'Total Staff Shifts',v:weekStaff||'—',s:weekHours?`${weekHours} hrs total`:'',cls:''},
  ].map(c=>`<div class="card"><div class="cl">${c.l}</div><div class="cv sm">${c.v}</div>${c.s?`<div class="cs ${c.cls}">${c.s}</div>`:''}</div>`).join('');

  document.getElementById('dayGrid').innerHTML=DAYS.map((day,i)=>{
    const dt=addDays(currentMon,i),isToday=dt.getTime()===today.getTime(),d=dayTotals[i];
    const varB=d.bud?d.total-d.bud:null,varL=d.ly?d.total-d.ly:null;
    const pbrPct=d.pbr>0?Math.min(100,(d.total/d.pbr)*100):0;
    const pbrCol=pbrPct>=100?'var(--grn)':pbrPct>=70?'var(--amb)':'var(--red)';
    const wk=D[key][i];
    return`<div class="day-card${isToday?' today':''}">
      <div class="day-head"><span class="day-name">${day}</span><span class="day-date">${fmtDate(dt)}</span></div>
      <div class="day-body">
        <div class="day-total">${d.total>0?f(d.total):'—'}</div>
        <div class="day-vs" style="color:${varB===null?'var(--mute)':varB>=0?'var(--grn)':'var(--red)'}">
          ${varB!==null?f(varB)+' vs bud':'No budget'}${varL!==null?' · '+f(varL)+' vs LY':''}
        </div>
        ${d.pbr>0?`<div class="pbr-row"><span class="pbr-label">PBR ${f(d.pbr)}</span><div class="pbr-bar-wrap"><div class="pbr-bar" style="width:${pbrPct}%;background:${pbrCol}"></div></div><span style="font-size:10px;color:${pbrCol}">${pbrPct.toFixed(0)}%</span></div>`:''}
        <hr class="day-divider">
        <div class="field-row"><span class="field-lbl">Wet £</span><input type="number" class="field-inp" placeholder="0" step="0.01" value="${wk.wet}" oninput="update('${key}',${i},'wet',this.value)"></div>
        <div class="field-row"><span class="field-lbl">Dry £</span><input type="number" class="field-inp" placeholder="0" step="0.01" value="${wk.dry}" oninput="update('${key}',${i},'dry',this.value)"></div>
        <div class="field-row"><span class="field-lbl">Gaming £</span><input type="number" class="field-inp" placeholder="0" step="0.01" value="${wk.gam}" oninput="update('${key}',${i},'gam',this.value)"></div>
        <hr class="day-divider">
        <div class="field-row"><span class="field-lbl">PBR £</span><input type="number" class="field-inp pbr" placeholder="0" step="0.01" value="${wk.pbr}" oninput="update('${key}',${i},'pbr',this.value)"></div>
        <hr class="day-divider">
        <div style="font-size:9px;color:var(--mute);letter-spacing:.8px;margin-bottom:4px;">BUDGET</div>
        <div class="field-row"><span class="field-lbl">Wet £</span><input type="number" class="field-inp" style="border-color:rgba(255,255,255,.08)" placeholder="0" step="0.01" value="${wk.bud_wet}" oninput="update('${key}',${i},'bud_wet',this.value)"></div>
        <div class="field-row"><span class="field-lbl">Dry £</span><input type="number" class="field-inp" style="border-color:rgba(255,255,255,.08)" placeholder="0" step="0.01" value="${wk.bud_dry}" oninput="update('${key}',${i},'bud_dry',this.value)"></div>
        <div class="field-row"><span class="field-lbl">Gaming £</span><input type="number" class="field-inp" style="border-color:rgba(255,255,255,.08)" placeholder="0" step="0.01" value="${wk.bud_gam}" oninput="update('${key}',${i},'bud_gam',this.value)"></div>
        <hr class="day-divider">
        <div style="font-size:9px;color:var(--mute);letter-spacing:.8px;margin-bottom:4px;">LAST YEAR</div>
        <div class="field-row"><span class="field-lbl">Wet £</span><input type="number" class="field-inp" style="border-color:rgba(255,255,255,.08)" placeholder="0" step="0.01" value="${wk.ly_wet}" oninput="update('${key}',${i},'ly_wet',this.value)"></div>
        <div class="field-row"><span class="field-lbl">Dry £</span><input type="number" class="field-inp" style="border-color:rgba(255,255,255,.08)" placeholder="0" step="0.01" value="${wk.ly_dry}" oninput="update('${key}',${i},'ly_dry',this.value)"></div>
        <div class="field-row"><span class="field-lbl">Gaming £</span><input type="number" class="field-inp" style="border-color:rgba(255,255,255,.08)" placeholder="0" step="0.01" value="${wk.ly_gam}" oninput="update('${key}',${i},'ly_gam',this.value)"></div>
        <hr class="day-divider">
        <div style="font-size:9px;color:var(--mute);letter-spacing:.8px;margin-bottom:5px;">STAFF</div>
        <div class="staff-row">
          <div style="flex:1"><input type="number" class="staff-inp" placeholder="0" min="0" step="1" value="${wk.staff}" oninput="update('${key}',${i},'staff',this.value)"><div class="staff-lbl">Shifts</div></div>
          <div style="flex:1"><input type="number" class="staff-inp" placeholder="0" min="0" step="0.5" value="${wk.hours}" oninput="update('${key}',${i},'hours',this.value)"><div class="staff-lbl">Hours</div></div>
        </div>
        <textarea class="day-notes" placeholder="Notes…" oninput="update('${key}',${i},'notes',this.value)">${wk.notes||''}</textarea>
      </div></div>`;
  }).join('');

  // Summary table
  const rows=[
    {l:'Wet Revenue',field:'wet',src:'act'},{l:'Dry Revenue',field:'dry',src:'act'},
    {l:'Gaming Rev',field:'gam',src:'act'},{l:'Total Revenue',field:'total',src:'total'},
    {l:'PBR',field:'pbr',src:'pbr'},{l:'Staff Shifts',field:'staff',src:'staff'},{l:'Staff Hours',field:'hours',src:'hours'},
  ];
  let sh='';
  rows.forEach(r=>{
    const vals=DAYS.map((_,i)=>{
      if(r.src==='act')return gn(key,i,r.field);
      if(r.src==='total')return dayTotals[i].total;
      if(r.src==='pbr')return dayTotals[i].pbr;
      return gn(key,i,r.field);
    });
    const wkTotal=vals.reduce((a,b)=>a+b,0);
    const isRev=['wet','dry','gam','total'].includes(r.field);
    let budTotal=0,lyTotal=0;
    if(isRev){DAYS.forEach((_,i)=>{if(r.src==='act'){budTotal+=gn(key,i,`bud_${r.field}`);lyTotal+=gn(key,i,`ly_${r.field}`);}else if(r.src==='total'){budTotal+=dayTotals[i].bud;lyTotal+=dayTotals[i].ly;}});}
    const varB=wkTotal-budTotal,varL=wkTotal-lyTotal;
    const fmt=isRev?f:v=>v||'—';
    sh+=`<tr class="${r.field==='total'?'tot':''}"><td>${r.l}</td>${vals.map(v=>`<td>${fmt(v)}</td>`).join('')}<td>${fmt(wkTotal)}</td><td>${isRev?f(budTotal):'—'}</td><td class="${isRev?vcol(varB):''}">${isRev?f(varB):'—'}</td><td class="${isRev?vcol(varB):''}">${isRev&&budTotal?fp((varB/Math.abs(budTotal))*100):'—'}</td><td>${isRev?f(lyTotal):'—'}</td><td class="${isRev?vcol(varL):''}">${isRev?f(varL):'—'}</td><td class="${isRev?vcol(varL):''}">${isRev&&lyTotal?fp((varL/Math.abs(lyTotal))*100):'—'}</td></tr>`;
  });
  document.getElementById('summaryBody').innerHTML=sh;

  // PBR table
  let ph='';
  DAYS.forEach((day,i)=>{
    const dt=addDays(currentMon,i),pbr=dayTotals[i].pbr,actual=dayTotals[i].total,varPBR=actual-pbr;
    const conv=pbr>0?(actual/pbr)*100:null,cl=vcol(varPBR);
    const status=pbr===0?`<span style="color:var(--mute)">No PBR</span>`:conv>=100?`<span class="dot dg"></span><span style="color:var(--grn)">Exceeded</span>`:conv>=70?`<span class="dot da"></span><span style="color:var(--amb)">Partial</span>`:` <span class="dot dr"></span><span style="color:var(--red)">Below</span>`;
    ph+=`<tr><td>${day} ${fmtDate(dt)}</td><td>${pbr?f(pbr):'—'}</td><td>${actual?f(actual):'—'}</td><td class="${pbr?cl:''}">${pbr?f(varPBR):'—'}</td><td>${conv!==null?conv.toFixed(1)+'%':'—'}</td><td>${status}</td></tr>`;
  });
  const tPBR=dayTotals.reduce((s,d)=>s+d.pbr,0),tAct=weekTotal,tVar=tAct-tPBR,tConv=tPBR>0?(tAct/tPBR)*100:null;
  ph+=`<tr class="tot"><td>Week Total</td><td>${f(tPBR)}</td><td>${f(tAct)}</td><td class="${vcol(tVar)}">${f(tVar)}</td><td>${tConv!==null?tConv.toFixed(1)+'%':'—'}</td><td>${tConv===null?'—':tConv>=100?'<span style="color:var(--grn)">On Track</span>':'<span style="color:var(--red)">Below PBR</span>'}</td></tr>`;
  document.getElementById('pbrBody').innerHTML=ph;
}

function update(key,di,field,val){
  ensWeek(key);
  D[key][di][field]=val===''?'':(TEXT_FIELDS.includes(field)?val:(isNaN(parseFloat(val))?val:parseFloat(val)));
  schedSave(key,di,field);
  render();
}

function exportCSV(){
  const key=weekKey(currentMon);ensWeek(key);
  const rows=[['Day','Date','Wet','Dry','Gaming','Total','PBR','Bud Wet','Bud Dry','Bud Gaming','Bud Total','LY Wet','LY Dry','LY Gaming','LY Total','Staff Shifts','Staff Hours','Notes']];
  DAYS.forEach((day,i)=>{
    const dt=addDays(currentMon,i),w=D[key][i];
    const wet=parseFloat(w.wet)||0,dry=parseFloat(w.dry)||0,gam=parseFloat(w.gam)||0;
    const bw=parseFloat(w.bud_wet)||0,bd=parseFloat(w.bud_dry)||0,bg=parseFloat(w.bud_gam)||0;
    const lw=parseFloat(w.ly_wet)||0,ld=parseFloat(w.ly_dry)||0,lg=parseFloat(w.ly_gam)||0;
    rows.push([day,fmtDate(dt),wet,dry,gam,wet+dry+gam,parseFloat(w.pbr)||0,bw,bd,bg,bw+bd+bg,lw,ld,lg,lw+ld+lg,parseFloat(w.staff)||0,parseFloat(w.hours)||0,`"${(w.notes||'').replace(/"/g,'""')}"`]);
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));a.download=`roxy_daily_${key}.csv`;a.click();toast('CSV exported ✓','success');
}

async function clearWeek(){
  const key=weekKey(currentMon);
  if(!confirm(`Reset all data for ${key}? This cannot be undone.`))return;
  setSyncStatus('syncing');
  try{
    await sbDelete('daily_data',`venue=eq.${CONFIG.venue}&week_key=eq.${key}`);
    delete D[key];render();setSyncStatus('ok');toast('Week reset','error');
  }catch(e){setSyncStatus('err');toast('Reset failed','error');}
}

function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className=`show ${type||''}`;clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2500);}

async function init(){await loadAndRender();}
</script>
</body>
